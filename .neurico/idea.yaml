idea:
  title: Natural Hallucinations
  domain: nlp
  hypothesis: 'Certain hallucinations produced by large language models (LLMs) are
    robust to the inclusion of additional information or changes in the question asked,
    making them difficult for LLMs to recognize even when all necessary information
    is present. These "natural hallucinations" may transfer across models and, if
    used in training, could be more easily remembered by models. Hallucinations found
    in older models may also predict hallucinations in later models.

    '
  background:
    description: 'LLMs still hallucinate quite a bit. One of the reasons for this
      may be that hallucinations are difficult for LLMs to recognize, even when they
      have all the information needed. Hallucinations are usually about something
      extra an LLM sees, but contradictory in-context information is normal to see,
      so doesn''t necessarily allow the model to know it''s hallucinating. This idea
      explores the robustness and transferability of such "natural hallucinations,"
      their memorability if used in training, and whether hallucinations in older
      models predict those in newer models.

      '
  metadata:
